<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>메르 아카이브 · 열람</title>
<style>
  :root{
    --ink:#0e1320;--ink2:#161d2e;--panel:#1b2436;--panel2:#222d44;
    --line:#2c3852;--line2:#3a4a6b;--txt:#e7ecf6;--mut:#8e9bb5;--mut2:#647190;
    --amber:#f5b544;--blue:#5aa9f0;--teal:#46c7b0;--rose:#ef6a78;--green:#52c98a;
    --A:#f5b544;--B:#5aa9f0;--C:#ef6a78;--D:#52c98a;--E:#46c7b0;--F:#7c89a6;--G:#a98bf0;--H:#e08a4c;--I:#d98ec0;--Z:#5c6a85;
  }
  *{box-sizing:border-box}html,body{margin:0}
  body{background:radial-gradient(1200px 600px at 80% -10%,#1a2740 0,transparent 60%),radial-gradient(900px 500px at -10% 110%,#1d1830 0,transparent 55%),var(--ink);
    color:var(--txt);font-family:"Pretendard","Inter",-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;font-size:14px;line-height:1.5}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 80px}
  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .brand h1{font-size:20px;margin:0;font-weight:760;letter-spacing:-.01em}
  .brand h1 .dim{color:var(--amber)}
  .brand p{margin:4px 0 0;color:var(--mut);font-size:12.5px}
  .stat-row{display:flex;gap:20px}
  .stat{text-align:right}.stat b{display:block;font-size:21px;font-weight:740;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .stat span{font-size:10.5px;color:var(--mut2);text-transform:uppercase;letter-spacing:.08em}
  /* view tabs */
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab{padding:8px 16px;border-radius:9px;border:1px solid var(--line2);background:var(--panel);color:var(--mut);cursor:pointer;font-size:13px;font-weight:600;transition:.12s}
  .tab:hover{color:var(--txt)}
  .tab.on{background:var(--amber);color:#241a06;border-color:var(--amber)}
  .tab.ghost{background:transparent;border-color:var(--line);color:var(--mut)}
  .tab.ghost:hover{border-color:var(--blue);color:var(--blue)}
  .tab.ghost.on{background:transparent;color:var(--blue);border-color:var(--blue)}
  /* loadbar */
  .loadbar{background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .loadbar .lbl{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.1em}
  input[type=text]{flex:1;min-width:240px;background:var(--ink);border:1px solid var(--line2);color:var(--txt);padding:9px 12px;border-radius:9px;font-size:13px;font-family:inherit}
  input[type=text]:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(90,169,240,.15)}
  .btn{border:1px solid var(--line2);background:var(--panel2);color:var(--txt);padding:9px 15px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s}
  .btn:hover{border-color:var(--mut);transform:translateY(-1px)}
  .btn.blue{background:linear-gradient(180deg,#3a8fe0,#2f6fc0);color:#fff;border-color:#3a8fe0}
  .hint{font-size:11.5px;color:var(--mut2);margin-top:4px;width:100%}
  .hint code{background:var(--ink);padding:1px 6px;border-radius:5px;color:var(--blue);font-size:11px}
  /* filters */
  .filters{display:flex;gap:13px;flex-wrap:wrap;align-items:center;margin:0 0 12px;padding:13px 15px;background:var(--ink2);border:1px solid var(--line);border-radius:12px}
  .fgroup{display:flex;flex-direction:column;gap:5px}
  .fgroup .t{font-size:10.5px;color:var(--mut2);text-transform:uppercase;letter-spacing:.08em}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-size:12px;padding:5px 11px;border-radius:99px;border:1px solid var(--line2);background:var(--panel);color:var(--mut);cursor:pointer;transition:.12s;user-select:none}
  .chip:hover{color:var(--txt);border-color:var(--mut2)}
  .chip.on{background:var(--blue);border-color:var(--blue);color:#08111f;font-weight:650}
  #q{flex:1;min-width:200px}
  .sortsel{background:var(--ink);border:1px solid var(--line2);color:var(--txt);padding:8px 10px;border-radius:8px;font-family:inherit;font-size:12.5px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--mut2);margin:0 2px 14px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block}
  .count{font-size:12px;color:var(--mut);margin-bottom:8px}.count b{color:var(--txt)}
  /* list cards */
  .grid{display:flex;flex-direction:column;gap:8px}
  .card{background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:11px;padding:13px 15px;display:grid;grid-template-columns:1fr auto;gap:5px 14px;transition:.12s}
  .card:hover{border-color:var(--line2);transform:translateX(2px)}
  .card .title{font-size:14.5px;font-weight:620;letter-spacing:-.01em;cursor:pointer;line-height:1.35}
  .card .title:hover{color:var(--amber)}
  .card .meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:var(--mut2);margin-top:3px}
  .badge{font-size:11px;font-weight:680;padding:3px 9px;border-radius:7px;white-space:nowrap}
  .sub{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--panel2);color:var(--mut);border:1px solid var(--line)}
  .series-tag{font-size:11px;color:var(--amber);background:rgba(245,181,68,.1);padding:2px 8px;border-radius:6px;cursor:pointer;border:1px solid rgba(245,181,68,.25)}
  .series-tag:hover{background:rgba(245,181,68,.2)}
  .tag{font-size:10.5px;color:var(--mut2);background:var(--ink);padding:2px 7px;border-radius:5px;border:1px solid var(--line)}
  .right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:80px}
  .date{font-size:11px;color:var(--mut2);font-variant-numeric:tabular-nums}
  /* group view */
  .group{background:var(--ink2);border:1px solid var(--line);border-radius:13px;margin-bottom:12px;overflow:hidden}
  .ghead{display:flex;align-items:center;gap:11px;padding:13px 16px;cursor:pointer;user-select:none}
  .ghead:hover{background:var(--panel)}
  .ghead .gname{font-size:14.5px;font-weight:680}
  .ghead .gcount{font-size:11.5px;color:var(--mut2);margin-left:auto;font-variant-numeric:tabular-nums}
  .ghead .gbar{width:5px;align-self:stretch;border-radius:3px;margin:-13px 0 -13px -16px;padding-left:5px}
  .ghead .arrow{color:var(--mut2);transition:.2s;font-size:12px}
  .group.open .arrow{transform:rotate(90deg)}
  .gbody{display:none;padding:0 12px 12px}
  .group.open .gbody{display:block}
  .gline{display:flex;gap:10px;align-items:baseline;padding:8px 8px;border-radius:8px;cursor:pointer;border-top:1px solid var(--line)}
  .gline:hover{background:var(--panel)}
  .gline .gt{font-size:13.5px;flex:1}.gline:hover .gt{color:var(--amber)}
  .gline .gd{font-size:11px;color:var(--mut2);font-variant-numeric:tabular-nums}
  .gline .gsub{font-size:10.5px;color:var(--mut2)}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(6,9,16,.8);display:none;align-items:center;justify-content:center;z-index:50;padding:18px;backdrop-filter:blur(3px)}
  .modal.on{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line2);border-radius:16px;max-width:780px;width:100%;max-height:88vh;overflow:auto;padding:22px 24px}
  .sheet h2{margin:0 0 4px;font-size:18px;line-height:1.3}
  .sheet .x{float:right;cursor:pointer;color:var(--mut);font-size:22px;line-height:1;margin:-4px -4px 0 0}
  .sheet .x:hover{color:var(--txt)}
  .sheet .mmeta{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin:10px 0 14px}
  .sheet a.src{color:var(--blue);font-size:12px;text-decoration:none}
  .reason{font-size:12px;color:var(--mut);background:var(--ink);border-radius:8px;padding:8px 11px;border-left:2px solid var(--line2)}
  .sheet .body{font-size:13.5px;line-height:1.78;color:#cdd6e8;white-space:pre-wrap;margin-top:12px}
  .simwrap{margin:16px 0 2px;border-top:1px solid var(--line);padding-top:14px}
  .simwrap .st{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .simrow{display:flex;gap:9px;align-items:baseline;padding:7px 9px;border-radius:8px;cursor:pointer}
  .simrow:hover{background:var(--ink2)}
  .simrow .pct{font-size:10.5px;color:var(--teal);font-variant-numeric:tabular-nums;min-width:34px}
  .simrow .stt{font-size:13px;flex:1}.simrow:hover .stt{color:var(--amber)}
  .simrow .sd{font-size:10.5px;color:var(--mut2)}
  .empty{text-align:center;padding:64px 20px;color:var(--mut2)}
  .empty .big{font-size:15px;color:var(--mut);margin-bottom:8px}
  @media(max-width:640px){.card{grid-template-columns:1fr}.right{flex-direction:row;align-items:center;min-width:0}.stat-row{gap:13px}}
</style>

<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1><span class="dim">메르</span> 아카이브 · 열람</h1>
      <p>분류된 글을 묶어보고, 관련글을 찾고, 비슷한 글을 추천받습니다 <span style="color:var(--mut2);font-size:11px">· 코드북 v2 기준</span></p>
    </div>
    <div class="stat-row">
      <div class="stat"><b id="s-total">—</b><span>글</span></div>
      <div class="stat"><b id="s-series">—</b><span>시리즈</span></div>
      <div class="stat"><b id="s-topic">—</b><span>주제</span></div>
    </div>
  </header>

  <div class="loadbar" id="loadbar">
    <span class="lbl">데이터</span>
    <input type="text" id="sheetUrl" placeholder="구글시트 '웹에 게시(CSV)' URL — 비워두면 기본 시트 자동 로드">
    <button class="btn blue" id="loadUrlBtn">시트 불러오기</button>
    <button class="btn" id="loadFileBtn">CSV/JSON 파일 열기</button>
    <input type="file" id="fileInput" accept=".csv,.json" style="display:none">
    <div class="hint">구글시트를 <b>파일 → 공유 → 웹에 게시 → CSV</b>로 게시한 URL을 넣으면 <b>실시간 연동</b>됩니다(업로드 불필요). 시트에 새 분류 행을 추가하면 페이지가 자동 반영. 기본 시트가 설정돼 있으면 비워둬도 자동 로드됩니다.</div>
  </div>

  <div class="tabs">
    <div class="tab on" data-view="list">목록</div>
    <div class="tab" data-view="series">시리즈 묶음</div>
    <div class="tab" data-view="topic">주제 묶음</div>
    <div style="flex:1"></div>
    <div class="tab ghost" id="btnStruct">📊 분류 구조</div>
    <div class="tab ghost" id="btnGuide">📋 운영 가이드</div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="filters" id="filters">
    <input type="text" id="q" placeholder="제목·본문·근거 검색 (예: 양자암호, 호르무즈, HBM)">
    <div class="fgroup"><div class="t">대분류</div><div class="chips" id="macroChips"></div></div>
    <div class="fgroup" id="subWrap" style="display:none;width:100%"><div class="t">소분류 <span id="subHint" style="color:var(--mut2);font-weight:400"></span></div><div class="chips" id="subChips"></div></div>
    <div class="fgroup"><div class="t">형식</div><div class="chips" id="fmtChips"></div></div>
    <div class="fgroup"><div class="t">지역</div><div class="chips" id="regionChips"></div></div>
    <select class="sortsel" id="sortSel">
      <option value="date_desc">최신순</option><option value="date_asc">오래된순</option>
    </select>
  </div>

  <div class="count" id="count"></div>
  <div id="view-list"><div class="grid" id="grid"></div></div>
  <div id="view-series" style="display:none"></div>
  <div id="view-topic" style="display:none"></div>
  <div class="empty" id="empty"><div class="big">데이터를 불러오세요</div>분류도구에서 내보낸 JSON을 위에서 불러오면 시작됩니다.</div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheetBox"></div></div>

<script>
let MACRO={},SUBS={},POSTS=[],VIEW="list";
const F={macro:new Set(),sub:new Set(),fmt:new Set(),region:new Set(),q:"",sort:"date_desc"};

/* ---- load ---- */
// 기본 구글시트 게시 CSV URL (설정해두면 비워둬도 자동 로드)
const DEFAULT_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTVC-uZxhptpouWDoPqytKvdZ72rrlbRsIsvZVcdMc1fIK4_609ku4_BtSDWX49cN41bHlZacmzwhsK/pub?gid=1655305962&single=true&output=csv";

async function loadFromUrl(url){
  const proxies=[u=>u,u=>"https://corsproxy.io/?url="+encodeURIComponent(u),u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u)];
  for(const p of proxies){
    try{
      const r=await fetch(p(url));
      if(r.ok){
        const txt=await r.text();
        if(txt.trim().startsWith("{")){ // JSON
          const j=JSON.parse(txt); if(j.posts){ingest(j);return true;}
        } else { // CSV
          const j=csvToData(txt); if(j.posts.length){ingest(j);return true;}
        }
      }
    }catch(e){}
  }
  return false;
}
// CSV → {posts, codebook} 변환
function csvToData(text){
  text=text.replace(/^\uFEFF/,"");
  const rows=parseCSV(text).filter(r=>r.some(c=>c&&c.trim()));
  if(rows.length<2) return {posts:[]};
  const H=rows[0].map(x=>x.trim());
  const idx=n=>H.findIndex(h=>h===n||h.includes(n));
  const iId=idx("id"),iDate=idx("date"),iTitle=idx("title"),iLink=idx("link"),iCat=idx("cat"),
        iPrim=idx("primary"),iSubs=idx("subs"),iReg=idx("region"),iFmt=idx("format"),
        iSer=idx("series"),iConf=idx("confidence"),iRea=idx("reason"),iBody=idx("body");
  const posts=rows.slice(1).map(r=>({
    id:r[iId]||r[iLink]||r[iTitle], date:r[iDate]||"", title:r[iTitle]||"",
    link:iLink>=0?r[iLink]||"":"", cat:iCat>=0?r[iCat]||"":"",
    primary:(r[iPrim]||"Z0").trim(),
    subs:iSubs>=0&&r[iSubs]?r[iSubs].split("|").filter(Boolean):[],
    region:iReg>=0&&r[iReg]?r[iReg].split("|").filter(Boolean):[],
    format:iFmt>=0?r[iFmt]||"":"", series:iSer>=0?r[iSer]||"":"",
    confidence:iConf>=0?r[iConf]||"중":"중", reason:iRea>=0?r[iRea]||"":"",
    body:iBody>=0?r[iBody]||"":""
  })).filter(p=>p.title||p.body);
  return {posts, codebook:{macro:DEFAULT_MACRO, subs:DEFAULT_SUBS}};
}
// 견고한 CSV 파서 (따옴표·콤마·줄바꿈 처리)
function parseCSV(text){
  const rows=[];let i=0,f="",row=[],q=false;
  while(i<text.length){const c=text[i];
    if(q){ if(c=='"'){ if(text[i+1]=='"'){f+='"';i++} else q=false } else f+=c }
    else{ if(c=='"')q=true; else if(c==','){row.push(f);f=""} else if(c=='\n'){row.push(f);rows.push(row);row=[];f=""} else if(c=='\r'){} else f+=c }
    i++;
  }
  if(f.length||row.length){row.push(f);rows.push(row)}
  return rows;
}
function ingest(j){
  MACRO=j.codebook?.macro||MACRO; SUBS=j.codebook?.subs||SUBS; POSTS=j.posts||[];
  if(!Object.keys(SUBS).length) SUBS=DEFAULT_SUBS;
  if(!Object.keys(MACRO).length) MACRO=DEFAULT_MACRO;
  buildTokens(); renderFilters(); render(); updateStats();
  document.getElementById("empty").style.display=POSTS.length?"none":"block";
}
const DEFAULT_MACRO={A:{name:"⚡ 에너지·자원",color:"var(--A)"},B:{name:"🔬 첨단기술·산업",color:"var(--B)"},C:{name:"🌍 지정학·국제",color:"var(--C)"},D:{name:"💰 금융·자산시장",color:"var(--D)"},E:{name:"🏯 한국경제·기업",color:"var(--E)"},I:{name:"🛍️ 소비·서비스",color:"var(--I)"},G:{name:"🩺 건강·라이프",color:"var(--G)"},H:{name:"📰 사회·사건·잡학",color:"var(--H)"},F:{name:"✍️ 메타·운영",color:"var(--F)"},Z:{name:"🗂️ 기타·확장",color:"var(--Z)"}};
const DEFAULT_SUBS={A1:"🛢️ 원유·정유",A2:"🔥 천연가스·LNG",A3:"☢️ 원자력·우라늄",A4:"⚛️ 핵융합",A5:"🌱 신재생·수소",A6:"🔌 전력·그리드",A7:"⛏️ 산업금속·광물",A8:"🥇 귀금속",A9:"🌾 식량·농업자원",B1:"💾 메모리반도체",B2:"🏭 파운드리·반도체장비",B3:"🤖 AI",B4:"🔋 이차전지·전기차",B5:"🚢 조선·방산",B6:"🛰️ 우주·위성",B7:"🦾 로봇·자동화",B8:"⚛️ 양자",B9:"💊 바이오·제약",C1:"🦅 미국 정치·정책",C2:"🐼 중국",C3:"🗾 일본",C4:"🏝️ 대만·양안",C5:"🚀 한반도·북한",C6:"❄️ 러시아·우크라이나",C7:"🕌 중동",C8:"🐘 인도·동남아",C9:"📦 무역·수출통제",C10:"🏰 유럽(EU·서유럽)",D1:"💱 환율·외환",D2:"🏦 금리·중앙은행",D3:"📜 채권·국채",D4:"📈 주식시장",D5:"🏢 부동산",D6:"👵 연금·기관투자",D7:"🛡️ 보험·금융상품",D8:"🪙 암호화폐",D9:"💵 통화·달러패권",E1:"📊 한국 거시·정책",E2:"🏢 한국 개별기업",E3:"🏠 가계·생활경제 제도",I1:"🛒 유통·소비재",I2:"🚚 운송·물류",I3:"✈️ 여행·레저·엔터",G1:"🫀 질환·인체",G2:"🥗 식품·영양·먹거리",G3:"🏥 의료·응급제도",H1:"⚖️ 한국 사회이슈·사건",H2:"🌪️ 재난·기후·사고",H3:"📚 역사·인문·잡학",F1:"💬 주절주절·잡담",F2:"📝 블로그 운영",F3:"💡 종목 코멘트·후기",Z0:"❓ 기타·미분류"};

/* ---- token build for similarity ---- */
function tokenize(s){
  return (s||"").toLowerCase()
    .replace(/[^가-힣a-z0-9\s]/g," ").split(/\s+/)
    .filter(w=>w.length>=2 && !STOP.has(w));
}
const STOP=new Set(["근황","이야기","feat","대한","위한","그리고","하지만","때문","경우","정도","관련","오늘","다시","우리","에서","으로","이다","한다","된다","있다","없다","그회사","주절주절"]);
let IDF={};
function buildTokens(){
  const df={};
  POSTS.forEach(p=>{ p._tok=new Set(tokenize(p.title+" "+(p.body||"").slice(0,1200)));
    p._tok.forEach(t=>df[t]=(df[t]||0)+1); });
  const N=POSTS.length; IDF={};
  Object.entries(df).forEach(([t,c])=>IDF[t]=Math.log(1+N/c));
}
function similarity(a,b){
  // 메타 유사 + 키워드 유사 가중 합
  let meta=0;
  if(a.primary===b.primary) meta+=0.45;
  else if(a.primary[0]===b.primary[0]) meta+=0.18;
  if(a.series&&a.series===b.series) meta+=0.5;
  const sa=new Set([a.primary,...(a.subs||[])]), sb=new Set([b.primary,...(b.subs||[])]);
  let inter=0; sa.forEach(x=>{if(sb.has(x))inter++;});
  meta += 0.12*inter;
  const ra=new Set(a.region||[]), rb=new Set(b.region||[]); let ri=0; ra.forEach(x=>{if(rb.has(x))ri++;});
  meta += 0.05*ri;
  // keyword cosine (tf=1, idf weighted)
  let dot=0,na=0,nb=0;
  a._tok.forEach(t=>{const w=IDF[t]||0; na+=w*w; if(b._tok.has(t))dot+=w*w;});
  b._tok.forEach(t=>{const w=IDF[t]||0; nb+=w*w;});
  const cos = (na&&nb)?dot/Math.sqrt(na*nb):0;
  return meta*0.7 + cos*0.65;   // 합산 스코어(0~~1.x)
}
function similarTo(post,k=6){
  return POSTS.filter(p=>p.id!==post.id)
    .map(p=>({p,s:similarity(post,p)}))
    .sort((x,y)=>y.s-x.s).slice(0,k).filter(x=>x.s>0.08);
}

    c.onclick=()=>{ if(F.macro.has(k)){F.macro.delete(k);c.classList.remove("on");c.style.background="";c.style.color="";}else{F.macro.add(k);c.classList.add("on");c.style.background=v.color;c.style.color="#0e1320";} renderSubChips(); render(); };
    mc.appendChild(c);});
  fillChips("fmtChips",["근황시리즈","신규딥다이브","속보·이벤트","투자아이디어","생활상식"],F.fmt);
  fillChips("regionChips",["미국","중국","일본","한국","유럽","중동","인도·동남아","러시아","글로벌"],F.region);

// 선택된 대분류의 소분류 칩 표시 + 각 소분류 글 수
function renderSubChips(){
  const wrap=document.getElementById("subWrap"), box=document.getElementById("subChips");
  box.innerHTML="";
  if(!F.macro.size){ wrap.style.display="none"; F.sub.clear(); return; }
  wrap.style.display="";
  // 선택된 대분류들에 속한 소분류 코드 수집(주분류 기준 글 수 집계)
  const cnt={};
  POSTS.forEach(p=>{ if(F.macro.has(p.primary[0])) cnt[p.primary]=(cnt[p.primary]||0)+1; });
  const subs=Object.keys(SUBS).filter(code=>F.macro.has(code[0]));
  // 선택해제된 소분류가 현재 대분류에 없으면 제거
  [...F.sub].forEach(s=>{ if(!F.macro.has(s[0])) F.sub.delete(s); });
  document.getElementById("subHint").textContent = "("+[...F.macro].join("·")+" 안에서 좁히기)";
  subs.forEach(code=>{
    const n=cnt[code]||0;
    const c=document.createElement("div");c.className="chip";
    c.innerHTML=`${code} ${SUBS[code]} <span style="opacity:.6">${n}</span>`;
    if(F.sub.has(code))c.classList.add("on");
    c.onclick=()=>{ F.sub.has(code)?F.sub.delete(code):F.sub.add(code); c.classList.toggle("on"); render(); };
    box.appendChild(c);
  });
}
function fillChips(id,items,set){const el=document.getElementById(id);el.innerHTML="";
  items.forEach(it=>{const c=document.createElement("div");c.className="chip";c.textContent=it;if(set.has(it))c.classList.add("on");
    c.onclick=()=>{set.has(it)?set.delete(it):set.add(it);c.classList.toggle("on");render();};el.appendChild(c);});}
function pass(p){
  if(F.macro.size&&!F.macro.has(p.primary[0])&&!(p.subs||[]).some(s=>F.macro.has(s[0])))return false;
  if(F.sub.size&&!F.sub.has(p.primary)&&!(p.subs||[]).some(s=>F.sub.has(s)))return false;
  if(F.fmt.size&&!F.fmt.has(p.format))return false;
  if(F.region.size&&!(p.region||[]).some(x=>F.region.has(x)))return false;
  if(F.q){const h=(p.title+" "+p.body+" "+p.reason+" "+p.primary+" "+(SUBS[p.primary]||"")+" "+(p.subs||[]).map(s=>SUBS[s]).join(" ")+" "+p.series).toLowerCase();if(!h.includes(F.q.toLowerCase()))return false;}
  return true;
}
const pd=d=>{const t=Date.parse(d);return isNaN(t)?0:t;};

function renderSeries(){

    posts.sort((a,b)=>pd(b.date)-pd(a.date));

function renderTopic(){

function glineHTML(p){

    ${sims.map(({p:s,s:sc})=>`<div class="simrow" onclick='openModal(${JSON.stringify(s.id)})'>
      <span class="pct">${Math.round(Math.min(sc,1)*100)}%</span>
      <span class="stt">${esc(s.title)}</span>

  document.getElementById("sheetBox").innerHTML=`<span class="x" onclick="closeModal()">×</span>
    <h2>${esc(p.title)||"(제목 없음)"}</h2>

    ${(p.subs||[]).map(s=>`<span class="sub">${s} ${SUBS[s]||""}</span>`).join("")}

function showStructure(){
  // 대분류별 소분류와 글 수 집계
  const cnt={}, mcnt={};
  POSTS.forEach(p=>{ cnt[p.primary]=(cnt[p.primary]||0)+1; mcnt[p.primary[0]]=(mcnt[p.primary[0]]||0)+1; });
  const conf={고:0,중:0,저:0}; POSTS.forEach(p=>conf[p.confidence]=(conf[p.confidence]||0)+1);
  const serCnt=new Set(POSTS.filter(p=>p.series).map(p=>p.series)).size;
  let html=`<span class="x" onclick="closeModal()">×</span><h2>📊 분류 구조</h2>
    <div style="color:var(--mut);font-size:12.5px;margin:6px 0 16px">전체 ${POSTS.length}편 · 시리즈 ${serCnt}개 · 확신도 고 ${conf.고} / 중 ${conf.중} / 저 ${conf.저}</div>`;
  Object.entries(MACRO).forEach(([mk,mv])=>{

    subs.forEach(code=>{
      const n=cnt[code]||0;

      html+=`<span onclick="closeModal();jumpToSub('${code}')" style="cursor:pointer;font-size:12px;padding:4px 9px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);${dim}">${code} ${SUBS[code]} <b style="color:${mv.color}">${n}</b></span>`;
    });

  html+=`<div style="margin-top:18px;padding-top:12px;border-top:1px solid var(--line);color:var(--mut2);font-size:11.5px">소분류를 클릭하면 그 분류의 글로 좁혀집니다. 색 숫자는 주분류 기준 글 수입니다.</div>`;
  document.getElementById("sheetBox").innerHTML=html;
  document.getElementById("modal").classList.add("on");
  document.getElementById("sheetBox").scrollTop=0;
}

  window.scrollTo({top:0,behavior:"smooth"});
}

[첨부] 새 글 CSV / 코드북 / 과거 분류결과 JSON

document.getElementById("loadUrlBtn").onclick=async()=>{
  let u=document.getElementById("sheetUrl").value.trim()||DEFAULT_SHEET_URL;
  if(!u){alert("구글시트 게시 CSV URL을 입력하세요");return;}
  if(u.includes("/edit")){ // /edit 링크면 export csv로 변환
    let gid=(u.match(/[?&#]gid=(\d+)/)||[])[1];
    u=u.replace(/\/edit.*$/,"/export?format=csv")+(gid?"&gid="+gid:"");
  }
  const btn=document.getElementById("loadUrlBtn");btn.textContent="불러오는 중…";btn.disabled=true;
  const ok=await loadFromUrl(u);
  btn.textContent="시트 불러오기";btn.disabled=false;
  if(!ok)alert("불러오기 실패 — 시트가 '웹에 게시(CSV)'로 공개됐는지 확인하세요. 'CSV/JSON 파일 열기'로 직접 여는 방법도 있습니다.");
};
document.getElementById("loadFileBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{
    const t=r.result.trim();
    if(t.startsWith("{")) ingest(JSON.parse(t));
    else ingest(csvToData(r.result));
  }catch(err){alert("파일 해석 실패: "+err.message);}};
  r.readAsText(f,"utf-8");e.target.value="";};

/* 자동 로드: 기본 시트 URL → 없으면 같은 폴더 CSV/JSON */
(async()=>{
  if(DEFAULT_SHEET_URL){ if(await loadFromUrl(DEFAULT_SHEET_URL))return; }
  try{const r=await fetch("메르_분류_시트용.csv");if(r.ok){ingest(csvToData(await r.text()));return;}}catch(e){}
  try{const r=await fetch("메르_분류결과.json");if(r.ok){const j=await r.json();if(j.posts)ingest(j);}}catch(e){}
})();
renderFilters();
</script>
